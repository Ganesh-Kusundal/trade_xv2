repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # DR-T3: mirror the CI ERROR-mode gate — type-check the domain + OMS submodules
        # that currently pass mypy with 0 errors (verified). This is ERROR mode
        # (no --ignore-... that hides failures), so a regression in a clean module
        # blocks the commit locally, matching CI. Brokers and the remaining
        # error-bearing domain/OMS modules are intentionally excluded here (tracked
        # advisory in CI, full flip deferred to P7).
        files: ^src/(domain/(aggregates|analytics|backtest|capability_manifest|constants|market|models|primitives|providers|quotes|repositories|risk|scanners|sessions|value_objects)/.*|application/oms/reconciliation/.*|application/oms/(__init__\.py|composition\.py|daily_pnl_reset_scheduler\.py|errors\.py|factory\.py|idempotency_guard\.py|ledger_shadow\.py|order_audit_logger\.py|order_position_updater\.py|order_repository_adapter\.py|order_state_validator\.py|order_validator\.py|process_context\.py|protocols\.py|recon_heal_policy\.py|risk_manager\.py|square_off_service\.py))$
        additional_dependencies: [pydantic, pandas, requests]
        args: [--ignore-missing-imports]

  # Fast test checks (run on staged test files only)
  - repo: local
    hooks:
      - id: pytest-smoke
        name: Pytest Smoke Test
        entry: pytest
        language: system
        types: [python]
        files: ^tests/
        args: [
          "-m", "unit",
          "-x", "--tb=short", "-q",
          "tests/unit/brokers/",
          "tests/integration/brokers/",
        ]
        pass_filenames: false
        description: Run fast unit tests on broker test files

      - id: check-exception-hierarchy
        name: Exception Hierarchy Check
        entry: python scripts/architecture/check_exception_hierarchy.py
        language: system
        files: \.py$
        pass_filenames: false
        description: Verify all exceptions inherit from TradeXV2Error

      - id: architecture-tests
        name: Architecture Fitness Tests
        entry: python -m pytest tests/architecture/ -x -q
        language: system
        files: \.py$
        pass_filenames: false
        description: Run architecture fitness tests (fast subset)

      - id: check-scattered-constants
        name: Scattered Constants Check
        entry: python scripts/check_scattered_constants.py
        language: system
        files: \.py$
        pass_filenames: false
        description: Detect hardcoded exchange/segment constants outside constants module

      - id: check-file-loc
        name: Check file LOC limit (ADR-011)
        entry: python scripts/check_file_loc.py
        language: system
        types: [python]
