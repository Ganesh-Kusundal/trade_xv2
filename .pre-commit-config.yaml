repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^brokers/
        additional_dependencies: [pydantic, pandas, requests]
        args: [--ignore-missing-imports]

  # Fast test checks (run on staged test files only)
  - repo: local
    hooks:
      - id: pytest-smoke
        name: Pytest Smoke Test
        entry: pytest
        language: system
        types: [python]
        files: ^tests/
        args: [
          "-m", "unit",
          "-x", "--tb=short", "-q",
          "tests/brokers/dhan/tests/",
          "tests/brokers/upstox/tests/",
          "tests/brokers/paper/tests/",
        ]
        pass_filenames: false
        description: Run fast unit tests on broker test files
