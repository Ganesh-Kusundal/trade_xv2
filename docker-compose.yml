version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradexv2-app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - TRADE_XV2_ENV=production
    env_file:
      - .env.local
    volumes:
      - ./market_data:/app/market_data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development variant with hot-reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tradexv2-app-dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - TRADE_XV2_ENV=development
    env_file:
      - .env.local
    volumes:
      - .:/app
      - ./market_data:/app/market_data
      - ./logs:/app/logs
      - venv:/app/venv
    restart: unless-stopped
    profiles:
      - dev

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tradexv2-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: tradexv2-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  venv:
