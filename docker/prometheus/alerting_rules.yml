groups:
  - name: tradexv2_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate (>10% 5xx responses)"

      - alert: WebSocketConnectionSaturation
        expr: ws_active_connections / ws_max_connections > 0.9
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections above 90% capacity"

      - alert: OrderPlacementFailures
        expr: rate(orders_placed_total{status="failed"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Order placement failure rate elevated"

      - alert: KillSwitchActive
        expr: kill_switch_active == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Kill switch is active — all trading halted"

      - alert: DataLakeStale
        expr: time() - datalake_last_update_timestamp > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DataLake has not been updated in over 1 hour"
