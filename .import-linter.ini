[importlinter]
root_packages =
    brokers
    cli
    analytics
    datalake
    api
    application
    infrastructure
    domain

[importlinter:contract:infrastructure-independence]
name = infrastructure must not import brokers or application
type = forbidden
source_modules =
    infrastructure
forbidden_modules =
    brokers
    application
    analytics
    cli
    api

[importlinter:contract:brokers-common-no-analytics]
name = brokers.common must not import analytics
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    analytics

[importlinter:contract:brokers-common-independence]
name = brokers.common must not import broker adapters
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    brokers.common.core.tests.test_order_factory -> brokers.dhan.domain
    brokers.common.core.tests.test_order_factory -> brokers.dhan.segments
    brokers.common.oms.tests.test_oms_e2e -> brokers.dhan.exceptions
    brokers.common.oms.tests.test_oms_e2e -> brokers.dhan.http_client

[importlinter:contract:no-cli-in-datalake]
name = datalake must not import cli
type = forbidden
source_modules =
    datalake
forbidden_modules =
    cli

[importlinter:contract:no-cli-in-analytics]
name = analytics must not import cli
type = forbidden
source_modules =
    analytics
forbidden_modules =
    cli

[importlinter:contract:no-upstox-in-dhan]
name = Dhan must not import Upstox
type = forbidden
source_modules =
    brokers.dhan
forbidden_modules =
    brokers.upstox
ignore_imports =
    brokers.dhan.tests.contract.test_broker_contract -> brokers.upstox.auth.jwt_expiry

[importlinter:contract:no-dhan-in-upstox]
name = Upstox must not import Dhan
type = forbidden
source_modules =
    brokers.upstox
forbidden_modules =
    brokers.dhan

[importlinter:contract:analytics-no-broker-adapters]
name = analytics must not import broker-specific adapters
type = forbidden
source_modules =
    analytics
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
    cli

[importlinter:contract:application-broker-isolation]
name = application must not import broker implementations (dhan/upstox/paper)
type = forbidden
source_modules =
    application
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    application.execution.tests.test_execution_service -> brokers.paper.paper_gateway
    application.trading.tests.test_trading_orchestrator_e2e -> brokers.paper.paper_gateway
    application.oms.tests.test_oms_e2e -> brokers.common.resilience.circuit_breaker
    application.oms.tests.test_oms_e2e -> brokers.dhan.exceptions
    application.oms.tests.test_oms_e2e -> brokers.dhan.http_client

[importlinter:contract:runtime-no-brokers-common-event-bus]
name = runtime must not import deleted brokers.common.event_bus
type = forbidden
source_modules =
    runtime
forbidden_modules =
    brokers.common.event_bus

[importlinter:contract:api-no-cli]
name = api must not import cli
type = forbidden
source_modules =
    api
forbidden_modules =
    cli
