[importlinter]
root_packages =
    brokers
    cli
    analytics
    datalake

[importlinter:contract:brokers-common-independence]
name = brokers.common must not import broker adapters
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    brokers.common.core.tests.test_order_factory -> brokers.dhan.domain
    brokers.common.core.tests.test_order_factory -> brokers.dhan.segments
    brokers.common.oms.tests.test_oms_e2e -> brokers.dhan.exceptions
    brokers.common.oms.tests.test_oms_e2e -> brokers.dhan.http_client

[importlinter:contract:no-cli-in-datalake]
name = datalake must not import cli
type = forbidden
source_modules =
    datalake
forbidden_modules =
    cli

[importlinter:contract:no-cli-in-analytics]
name = analytics must not import cli
type = forbidden
source_modules =
    analytics
forbidden_modules =
    cli

[importlinter:contract:no-upstox-in-dhan]
name = Dhan must not import Upstox
type = forbidden
source_modules =
    brokers.dhan
forbidden_modules =
    brokers.upstox
ignore_imports =
    brokers.dhan.tests.contract.test_broker_contract -> brokers.upstox.auth.jwt_expiry

[importlinter:contract:no-dhan-in-upstox]
name = Upstox must not import Dhan
type = forbidden
source_modules =
    brokers.upstox
forbidden_modules =
    brokers.dhan

[importlinter:contract:analytics-no-broker-adapters]
name = analytics must not import broker-specific adapters
type = forbidden
source_modules =
    analytics
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
    cli
