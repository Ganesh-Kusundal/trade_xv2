[importlinter]
root_packages =
    brokers
    cli
    analytics
    datalake
    api
    application
    infrastructure
    domain

[importlinter:contract:infrastructure-independence]
name = infrastructure must not import brokers or application
type = forbidden
source_modules =
    infrastructure
forbidden_modules =
    brokers
    application
    analytics
    cli
    api
ignore_imports =
    # Justified: infrastructure needs broker error types for exception handling/retry
    infrastructure.global_exception_handler -> brokers.common.resilience.errors
    infrastructure.retry -> brokers.common.resilience.errors
    infrastructure.tests.test_global_exception_handler -> brokers.common.resilience.errors
    # Test-only: audit test imports application.audit
    infrastructure.tests.test_audit -> application.audit

[importlinter:contract:brokers-common-no-analytics]
name = brokers.common must not import analytics
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    analytics
ignore_imports =
    # Bootstrap has transitive chain to analytics via cli -> brokers.paper -> application
    brokers.common.bootstrap -> cli.services.broker_registry
    # Test-only: OMS tests have transitive chain to analytics via application
    brokers.common.oms.tests.* -> application.oms
    brokers.common.oms.tests.* -> application.oms.*
    # Test-only: broker tests have transitive chain to analytics via brokers.paper
    brokers.common.tests.* -> brokers.paper

[importlinter:contract:brokers-common-independence]
name = brokers.common must not import broker adapters
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    # Bootstrap needs broker registry for composition root wiring
    brokers.common.bootstrap -> cli.services.broker_registry
    # Test-only: integration tests use specific broker implementations
    brokers.common.tests.* -> brokers.dhan.*
    brokers.common.tests.* -> brokers.upstox.*
    brokers.common.tests.* -> brokers.upstox.*.*
    brokers.common.tests.* -> brokers.paper
    brokers.common.tests.* -> brokers.paper.*

[importlinter:contract:no-cli-in-datalake]
name = datalake must not import cli
type = forbidden
source_modules =
    datalake
forbidden_modules =
    cli

[importlinter:contract:no-cli-in-analytics]
name = analytics must not import cli
type = forbidden
source_modules =
    analytics
forbidden_modules =
    cli

[importlinter:contract:no-upstox-in-dhan]
name = Dhan must not import Upstox
type = forbidden
source_modules =
    brokers.dhan
forbidden_modules =
    brokers.upstox

[importlinter:contract:no-dhan-in-upstox]
name = Upstox must not import Dhan
type = forbidden
source_modules =
    brokers.upstox
forbidden_modules =
    brokers.dhan

[importlinter:contract:analytics-no-broker-adapters]
name = analytics must not import broker-specific adapters
type = forbidden
source_modules =
    analytics
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
    cli

[importlinter:contract:application-broker-isolation]
name = application must not import broker implementations (dhan/upstox/paper)
type = forbidden
source_modules =
    application
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    # Test-only: paper gateway used for integration testing
    application.execution.tests.test_execution_service -> brokers.paper.paper_gateway
    application.trading.tests.test_trading_orchestrator_e2e -> brokers.paper.paper_gateway
    application.oms.tests.test_risk_manager_margin -> brokers.common.api
    application.oms.tests.test_risk_manager_margin -> brokers.common.oms.margin_provider

[importlinter:contract:api-no-cli]
name = api must not import cli
type = forbidden
source_modules =
    api
forbidden_modules =
    cli

[importlinter:contract:domain-ports-independence]
name = domain.ports must not import application, brokers, or infrastructure
type = forbidden
source_modules =
    domain.ports
forbidden_modules =
    application
    brokers
    infrastructure

[importlinter:contract:domain-instruments-no-aggregates]
name = domain.instruments must not import domain.aggregates (consolidation guard)
type = forbidden
source_modules =
    domain.instruments
forbidden_modules =
    domain.aggregates

[importlinter:contract:analytics-no-datalake-concrete]
name = analytics must not import concrete datalake classes (gateway, research)
type = forbidden
source_modules =
    analytics
forbidden_modules =
    datalake.gateway
    datalake.research
ignore_imports =
    # Views need DuckDB utilities to create materialized views (justified: views are datalake consumers)
    analytics.views.manager -> datalake.core.duckdb_utils
    analytics.views.view_registry -> datalake.core.duckdb_utils
    analytics.views.manager -> datalake.analytics.options_analytics_sql
    analytics.precompute_features -> datalake.core.duckdb_utils
    # Stocks module uses DuckDB utilities for level analysis
    analytics.stocks.find_levels -> datalake.core.duckdb_utils
    # Replay orchestrator uses analytics provider adapter (transitive to datalake.gateway)
    analytics -> datalake.adapters.analytics_provider
    analytics.replay.* -> datalake.adapters.analytics_provider
    analytics.indicators.* -> datalake.adapters.analytics_provider

[importlinter:contract:application-infrastructure-separation]
name = application must not import concrete infrastructure (track remediation)
type = forbidden
source_modules =
    application
forbidden_modules =
    infrastructure
ignore_imports =
    # Production: OMS context wires infrastructure components (to be port-extracted)
    application.oms.context -> infrastructure.event_bus
    application.oms.context -> infrastructure.event_bus.persistent_dead_letter_queue
    application.oms.context -> infrastructure.event_log
    application.oms.context -> infrastructure.lifecycle
    application.oms.context -> infrastructure.observability.event_metrics
    application.oms.context -> infrastructure.persistence.sqlite_order_store
    # Production: Order manager uses infrastructure event bus and metrics
    application.oms.order_manager -> infrastructure.event_bus
    application.oms.order_manager -> infrastructure.logging_config
    application.oms.order_manager -> infrastructure.metrics
    application.oms.order_manager -> infrastructure.observability.event_metrics
    application.oms.order_manager -> infrastructure.observability.tracing
    application.oms.order_manager -> infrastructure.persistence.sqlite_order_store
    # Production: Trading orchestrator uses infrastructure event bus
    application.trading.trading_orchestrator -> infrastructure.event_bus
    # Production: Feature fetcher uses infrastructure market data adapter
    application.trading.feature_fetcher -> infrastructure.market_data_adapter
    # Production: Audit uses infrastructure logging and correlation
    application.audit -> infrastructure.correlation
    application.audit -> infrastructure.logging_config
    # Production: OMS modules with direct infrastructure dependencies (tracked debt)
    application.oms._internal.order_state_validator -> infrastructure.state_machine
    application.oms.daily_pnl_reset_scheduler -> infrastructure.lifecycle.*
    application.oms.extended_order_service -> infrastructure.event_bus.*
    application.oms.factory -> infrastructure.event_bus
    application.oms.factory -> infrastructure.event_log
    application.oms.persistence -> infrastructure.persistence.*
    application.oms.persistence.* -> infrastructure.persistence.*
    application.oms.position_manager -> infrastructure.event_bus
    application.oms.position_manager -> infrastructure.logging_config
    application.oms.position_manager -> infrastructure.observability.*
    application.oms.position_manager -> infrastructure.state_machine
    application.oms.reconciliation_service -> infrastructure.event_bus
    application.oms.reconciliation_service -> infrastructure.lifecycle
    application.oms.square_off_service -> infrastructure.event_bus.*
    # Production: Composer imports brokers.common which transitively uses infrastructure
    application.composer.* -> brokers.common.router
    application.composer.* -> brokers.common.stream_orchestrator
    application.composer.* -> brokers.common.provenance
    application.composer.* -> brokers.common.historical_coordinator
    application.composer.* -> brokers.common.infrastructure
    # Test-only: OMS tests import infrastructure for integration testing
    application.oms.tests.* -> infrastructure.event_bus
    application.oms.tests.* -> infrastructure.event_log
    application.oms.tests.* -> infrastructure.lifecycle
    application.oms.tests.* -> infrastructure.lifecycle.*
    application.oms.tests.* -> infrastructure.observability.*
    application.oms.tests.* -> infrastructure.persistence.*
    application.oms.tests.* -> infrastructure.state_machine
