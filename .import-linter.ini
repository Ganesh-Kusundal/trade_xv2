[importlinter]
root_packages =
    brokers
    cli
    analytics
    datalake
    api
    application
    infrastructure
    domain

[importlinter:contract:infrastructure-independence]
name = infrastructure must not import brokers or application
type = forbidden
source_modules =
    infrastructure
forbidden_modules =
    brokers
    application
    analytics
    cli
    api
ignore_imports =
    infrastructure.di -> brokers.common.resilience.errors
    infrastructure.di_scopes -> brokers.common.resilience.errors
    infrastructure.global_exception_handler -> brokers.common.resilience.errors
    infrastructure.retry -> brokers.common.resilience.errors
    infrastructure.security.secret_manager -> brokers.common.resilience.errors
    infrastructure.state_machine -> brokers.common.resilience.errors
    infrastructure.tests.test_audit -> application.audit
    infrastructure.tests.test_global_exception_handler -> brokers.common.resilience.errors

[importlinter:contract:brokers-common-no-analytics]
name = brokers.common must not import analytics
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    analytics
ignore_imports =
    brokers.common.oms.tests.* -> application.oms
    brokers.common.oms.tests.* -> application.oms.context
    brokers.common.bootstrap -> cli.services.broker_registry

[importlinter:contract:brokers-common-independence]
name = brokers.common must not import broker adapters
type = forbidden
source_modules =
    brokers.common
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    brokers.common.bootstrap -> cli.services.broker_registry

[importlinter:contract:no-cli-in-datalake]
name = datalake must not import cli
type = forbidden
source_modules =
    datalake
forbidden_modules =
    cli

[importlinter:contract:no-cli-in-analytics]
name = analytics must not import cli
type = forbidden
source_modules =
    analytics
forbidden_modules =
    cli

[importlinter:contract:no-upstox-in-dhan]
name = Dhan must not import Upstox
type = forbidden
source_modules =
    brokers.dhan
forbidden_modules =
    brokers.upstox

[importlinter:contract:no-dhan-in-upstox]
name = Upstox must not import Dhan
type = forbidden
source_modules =
    brokers.upstox
forbidden_modules =
    brokers.dhan

[importlinter:contract:analytics-no-broker-adapters]
name = analytics must not import broker-specific adapters
type = forbidden
source_modules =
    analytics
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
    cli

[importlinter:contract:application-broker-isolation]
name = application must not import broker implementations (dhan/upstox/paper)
type = forbidden
source_modules =
    application
forbidden_modules =
    brokers.dhan
    brokers.upstox
    brokers.paper
ignore_imports =
    application.execution.tests.test_execution_service -> brokers.paper.paper_gateway
    application.trading.tests.test_trading_orchestrator_e2e -> brokers.paper.paper_gateway
    application.oms.position_manager -> infrastructure.state_machine
    application.oms.tests.test_risk_manager_margin -> brokers.common.api
    application.oms.tests.test_risk_manager_margin -> brokers.common.oms.margin_provider

[importlinter:contract:api-no-cli]
name = api must not import cli
type = forbidden
source_modules =
    api
forbidden_modules =
    cli
