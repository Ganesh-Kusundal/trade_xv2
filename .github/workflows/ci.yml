name: CI

env:
  STRICT_EXECUTION_PARITY: "1"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan (tracked env files)
        run: |
          if git ls-files --error-unmatch .env.local .env.upstox 2>/dev/null; then
            echo "::error::Credential env file is git-tracked — remove and rotate keys"
            exit 1
          fi
          if git grep -E 'DHAN_ACCESS_TOKEN|DHAN_PIN' -- ':!*.md' ':!.github/*' 2>/dev/null; then
            echo "::error::Possible credential leak in tracked source"
            exit 1
          fi
          echo "secret scan OK"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Constants placement check
        run: python scripts/verify/check_constants_placement.py
      - name: Import linter
        # Pin PYTHONPATH so `domain` resolves to this repo's src/domain
        # (avoids silent shadow from other editable installs / .pth files).
        run: PYTHONPATH="${{ github.workspace }}/src" lint-imports --config pyproject.toml
      - name: Domain resolves in-repo
        run: |
          PYTHONPATH="${{ github.workspace }}/src" python -c "
          import domain, pathlib, os
          root = pathlib.Path(os.environ['GITHUB_WORKSPACE']).resolve()
          path = pathlib.Path(domain.__file__).resolve()
          assert str(path).startswith(str(root / 'src')), path
          print('domain OK', path)
          "
      - name: Pytest collection check (fail on collection errors)
        # DR-T4 / TRANS-P3-001: keep the tree at zero pytest collection errors.
        # pytest exits non-zero on collection errors; we also grep explicitly so
        # the failure is visible and not masked by later steps.
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest --collect-only -q -p no:cacheprovider 2>&1 | tee /tmp/collect.txt
          if grep -qiE "error collecting|ERROR collecting" /tmp/collect.txt; then
            echo "::error::Pytest collection errors detected — failing build (DR-T4)"
            exit 1
          fi
          echo "pytest collection OK (no errors)"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy (domain + OMS core — ERROR gate)
        # DR-T3: type-checks the domain + application/oms submodules that currently
        # pass mypy with 0 errors (verified: "Success: no issues found in 75 source
        # files"). This gate FAILS on any type error (no || true, no continue-on-error)
        # so a regression in a clean module turns CI red. The remaining error-bearing
        # modules are NOT yet enforced and are tracked below, to be folded in
        # incrementally (full repo flip deferred to P7):
        #   domain: candles, entities, events, executions, extensions, futures,
        #           indicators, instruments, options, orders, policies, portfolio,
        #           ports, services, specifications
        #   application/oms: _internal, capital_provider, context,
        #           extended_order_service, order_manager, position_manager,
        #           reconciliation_service, session_bridge, trade_recorder
        run: |
          set -e
          MYPY_CLEAN=(
            src/domain/aggregates src/domain/analytics src/domain/backtest
            src/domain/capability_manifest src/domain/constants src/domain/market
            src/domain/models src/domain/primitives src/domain/providers src/domain/quotes
            src/domain/repositories src/domain/risk src/domain/scanners src/domain/sessions
            src/domain/value_objects src/domain/extensions/broker_plugin_interface.py
            src/application/oms/reconciliation
            src/application/oms/__init__.py src/application/oms/composition.py
            src/application/oms/daily_pnl_reset_scheduler.py src/application/oms/errors.py
            src/application/oms/factory.py src/application/oms/idempotency_guard.py
            src/application/oms/ledger_shadow.py
            src/application/oms/ledger_authority.py
            src/application/oms/order_audit_logger.py src/application/oms/order_position_updater.py
            src/application/oms/order_repository_adapter.py src/application/oms/order_state_validator.py
            src/application/oms/order_validator.py
            src/application/oms/process_context.py src/application/oms/protocols.py
            src/application/oms/recon_heal_policy.py src/application/oms/risk_manager.py
            src/application/oms/square_off_service.py
            src/runtime/market_defaults.py src/runtime/ledger_policy.py
          )
          PYTHONPATH="${{ github.workspace }}/src" mypy "${MYPY_CLEAN[@]}"
          echo "::notice title=MyPy::domain + OMS core type checks passed (0 errors)"

      - name: MyPy (brokers — advisory until P7)
        # Brokers still carry ~499 errors (full flip deferred to P7). Tracked as a
        # warning only so it does not block merges; surfaced, not silent.
        run: |
          set +e
          mypy src/brokers/ 2>&1 | tee /tmp/mypy-output.txt
          EXIT_CODE=$?
          set -e
          ERROR_COUNT=$(grep -oP 'Found \K\d+(?= errors)' /tmp/mypy-output.txt || echo "0")
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning title=MyPy::brokers: Found $ERROR_COUNT type errors. Fix incrementally (P7)."
          else
            echo "::notice title=MyPy::brokers: All type checks passed!"
          fi
      - name: Bandit security scan
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json || true
          HIGH_COUNT=$(python3 -c "
          import json
          data = json.load(open('bandit-report.json'))
          high = [i for i in data.get('results', []) if i.get('issue_severity') == 'HIGH']
          print(len(high))
          ")
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT HIGH severity vulnerabilities in src/"
            exit 1
          fi
      # Safety check (ADR-019): advisory until Phase 7. Previously masked with
      # `|| true`, which discarded the CVE report entirely (AUDIT-006 / DR-T3).
      # Now it surfaces the finding count as a `::warning` (visible, not silent)
      # and stays non-blocking so it does not break the deployable principle.
      - name: Safety check (advisory)
        run: |
          set +e
          safety check --json --output safety-report.json
          set -e
          if [ -f safety-report.json ]; then
            COUNT=$(python3 -c "import json;d=json.load(open('safety-report.json'));print(len(d.get('vulnerabilities', d.get('results', []))))" 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning title=Safety::Found $COUNT known vulnerabilities (advisory until P7). Review safety-report.json."
            else
              echo "safety: no known vulnerabilities"
            fi
          fi
          exit 0
          # Upload report as artifact for review

  # Pyramid layers (wave 4): unit → component → architecture (fast path).
  # Integration/e2e remain in this job as non-live subset after unit/component.
  pyramid-unit:
    name: "Pyramid: unit"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Unit layer
        run: PYTHONPATH="${{ github.workspace }}/src" pytest tests/unit -q --tb=short -n auto --durations=10

  pyramid-component:
    name: "Pyramid: component"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Component layer
        run: PYTHONPATH="${{ github.workspace }}/src" pytest tests/component -q --tb=short -n auto --durations=10

  pyramid-architecture:
    name: "Pyramid: architecture"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Import linter
        run: PYTHONPATH="${{ github.workspace }}/src" lint-imports --config pyproject.toml
      - name: Static architecture CI scripts
        run: |
          python3 scripts/ci/check_no_mock_in_integration.py
          python3 scripts/ci/check_broker_name_branching.py
          python3 scripts/ci/check_canonical_domain_imports.py
          python3 scripts/ci/check_analytics_cross_imports.py
          python3 scripts/ci/check_cli_gateway_references.py
          python3 scripts/ci/check_rest_data_source_contract.py
      - name: Architecture layer
        run: PYTHONPATH="${{ github.workspace }}/src" pytest tests/architecture -q --tb=short --durations=10

  unit-and-contract:
    name: Unit & Contract Tests (coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, pyramid-unit, pyramid-component, pyramid-architecture]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Capability coverage report (P0 blocking)
        run: python scripts/audit/capability_report.py --fail-on P0
      - name: Capability coverage report (P1 blocking)
        run: python scripts/audit/capability_report.py --fail-on P1
      - name: Regenerate capability matrix artifact
        run: python scripts/audit/capability_report.py --markdown docs/audits/CAPABILITY_COVERAGE_MATRIX.md
      - name: Upload capability matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capability-matrix
          path: docs/audits/CAPABILITY_COVERAGE_MATRIX.md
      - name: Import boundary lint
        run: PYTHONPATH="${{ github.workspace }}/src" lint-imports --config pyproject.toml
      - name: Broker paper smoke (remaining gates)
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pip install -e ".[dev]"
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/unit/brokers/upstox/test_upstox_bus_golden.py -m certification -q --tb=short
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/architecture/test_shadow_parity_gate.py -q --tb=short
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/unit/brokers/upstox/test_market_feed_degraded.py -q --tb=short
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/architecture/test_factory_uses_canonical_paths.py tests/unit/application/services/test_api_readiness.py tests/unit/domain/test_nse_market_hours.py -q --tb=short
      # TOS-P3-005: continue-on-error is ADVISORY ONLY — never used on import-linter,
      # architecture tests, unit/component, or mypy clean-set gates. Doctor smoke is
      # intentionally non-blocking (environment noise must not block merges).
      - name: UI doctor smoke (warn-only)
        continue-on-error: true
        run: PYTHONPATH="${{ github.workspace }}/src" tradex ui doctor || true
      - name: Run unit + component + architecture with coverage
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest \
            tests/unit tests/component tests/architecture \
            -m "not integration and not sandbox and not live_readonly" \
            -n auto \
            --cov=brokers --cov=interface --cov=datalake --cov=analytics \
            --cov=application --cov=domain --cov=infrastructure --cov=runtime \
            --cov-branch --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml -q --durations=10
      - name: Integration (non-live) + component runtime
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest \
            tests/integration \
            -m "not sandbox and not live_readonly and not market_hours" \
            -q --tb=short \
            --ignore=tests/integration/brokers/dhan \
            --ignore=tests/integration/brokers/upstox \
            -n auto
      - name: Walk-forward unit suite
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/unit/analytics/walk_forward -q --tb=short
      - name: Replay determinism verifier
        run: PYTHONPATH="${{ github.workspace }}/src" pytest tests/integration/test_event_replay_determinism.py -q --tb=short
      - name: Auth integration (live TOTP skips without creds)
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest -m "auth_integration" -v --tb=short \
            tests/integration/test_auth_totp_live.py \
            tests/integration/test_websocket_reconnect_failure.py
      - name: Coverage threshold
        run: |
          coverage report --fail-under=80
      - name: Coverage gate - brokers module
        run: |
          coverage report --include="brokers/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 85) exit 1}'
      - name: Coverage gate - oms core
        run: |
          coverage report --include="application/oms/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 90) exit 1}'
      - name: Coverage gate - application layer
        run: |
          coverage report --include="application/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 80) exit 1}'
      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit.xml
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  quant-parity:
    name: Quant Parity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run quant parity tests
        env:
          STRICT_EXECUTION_PARITY: "1"
        run: |
          pytest tests/integration/quant/ -v --tb=short
      - name: Verify baseline quant parity
        run: |
          python scripts/verify/baseline_quant_parity.py --mode verify
      - name: Replay determinism verifier
        run: PYTHONPATH="${{ github.workspace }}/src" pytest tests/integration/test_event_replay_determinism.py -q --tb=short

  integration:
    name: Integration Tests (Dhan sandbox only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        env:
          DHAN_INTEGRATION: "1"
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/integration/brokers/dhan/ -m "sandbox" -v --tb=short
      - name: Auth integration regression (TOTP + WebSocket reconnect)
        run: |
          pytest -m "auth_integration" -v --tb=short \
            tests/integration/test_auth_totp_live.py \
            tests/integration/test_websocket_reconnect_failure.py
          echo "::notice title=Auth Integration::Requires .env.local / .env.upstox on runner for live TOTP tests; WS reconnect runs offline."

  # frontend job removed: no frontend/ package in this repo (CLI/TUI only).

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-and-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run E2E tests
        run: |
          pytest -m "e2e" -v --tb=short --durations=10 \
            tests/e2e/
      - name: Verify complete trading flow
        run: |
          pytest tests/e2e/test_complete_trading_flow.py -v --tb=short
      # test_multi_broker_failover.py is not in the tree; do not reference missing paths.
      - name: Verify order lifecycle
        run: |
          pytest tests/e2e/test_order_lifecycle.py -v --tb=short
      - name: Verify replay & backtest parity
        run: |
          pytest tests/e2e/test_replay_backtest_flow.py -v --tb=short
      - name: OMS cold-start / money-path component suite
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest tests/component/oms/ -q --tb=line -k "not integration"

  stress-tests:
    name: Stress & Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-and-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run stress tests
        run: |
          pytest -m "stress" -v --tb=short --durations=10 \
            tests/e2e/stress/
      - name: Run OMS stress tests
        run: |
          pytest tests/e2e/stress/test_oms_stress.py -v --tb=short
      - name: Performance regression check
        run: |
          # Run critical path benchmarks and compare against baseline
          pytest tests/e2e/stress/ -v --tb=short \
            --benchmark-only \
            --benchmark-compare \
            --benchmark-min-rounds=5 \
            || echo "::warning title=Performance::Performance regression detected"

  flaky-test-detection:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Advisory: flaky detection reports findings; it never gates merges.
      - name: Run flaky test detection on E2E tests
        run: |
          python scripts/debug/detect_flaky_tests.py tests/e2e/ --runs 3 --output flaky-e2e.json
        continue-on-error: true
      # Advisory: flaky detection reports findings; it never gates merges.
      - name: Run flaky test detection on broker unit tests
        run: |
          python scripts/debug/detect_flaky_tests.py tests/unit/brokers/ --runs 3 --output flaky-unit.json
        continue-on-error: true
      - name: Upload flaky test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-reports
          path: |
            flaky-e2e.json
            flaky-unit.json

  upstox-revalidation:
    name: Upstox Live Revalidation (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: env.UPSTOX_INTEGRATION == '1' || vars.UPSTOX_INTEGRATION == '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Explicitly non-blocking (env-gated): surfaces revalidation evidence only.
      - name: Run Upstox read-only revalidation harness
        env:
          UPSTOX_INTEGRATION: "1"
        run: python scripts/audit/revalidate_upstox_known_issues.py --output docs/audits/UPSTOX_REVALIDATION_EVIDENCE.md
        continue-on-error: true
      - name: Upload revalidation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstox-revalidation-evidence
          path: docs/audits/UPSTOX_REVALIDATION_EVIDENCE.md
