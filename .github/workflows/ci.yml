name: CI

env:
  STRICT_EXECUTION_PARITY: "1"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Constants placement check
        run: python scripts/check_constants_placement.py
      - name: Import linter
        run: lint-imports --config .import-linter.ini
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy (check + track)
        # Phase 0: Run MyPy on all brokers/ code, track error count
        # Errors are logged but don't block CI yet (499 errors exist)
        # Target: Reduce to 0 errors by Phase 4, then remove allow_failure
        run: |
          set +e
          mypy brokers/ 2>&1 | tee /tmp/mypy-output.txt
          EXIT_CODE=$?
          set -e
          ERROR_COUNT=$(grep -oP 'Found \K\d+(?= errors)' /tmp/mypy-output.txt || echo "0")
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning title=MyPy::Found $ERROR_COUNT type errors. Fix incrementally. Target: 0 by Phase 4."
          else
            echo "::notice title=MyPy::All type checks passed!"
          fi
      - name: Bandit security scan
        run: |
          bandit -r brokers/ cli/ datalake/ analytics/ -ll -f txt -o bandit-report.txt || true
          # Upload report as artifact for review
      - name: Safety check
        run: |
          safety check --json --output safety-report.json || true
          # Upload report as artifact for review

  unit-and-contract:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Architecture deepening enforcement
        run: pytest tests/architecture/test_deepening_enforcement.py -q --tb=short
      - name: Capability manifest contract
        run: pytest tests/capability/ -q --tb=short
      - name: Capability coverage report (P0 blocking)
        run: python scripts/capability_report.py --fail-on P0
      - name: Capability coverage report (P1 blocking)
        run: python scripts/capability_report.py --fail-on P1
      - name: Regenerate capability matrix artifact
        run: python scripts/capability_report.py --markdown docs/audits/CAPABILITY_COVERAGE_MATRIX.md
      - name: Upload capability matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capability-matrix
          path: docs/audits/CAPABILITY_COVERAGE_MATRIX.md
      - name: Import boundary lint
        run: lint-imports
      - name: Run unit + contract tests with coverage
        run: |
          pytest -m "not integration and not sandbox and not live_readonly" \
            -n auto \
            --cov=brokers --cov=cli --cov=datalake --cov=analytics \
            --cov=application --cov=domain --cov=infrastructure \
            --cov=tests/chaos \
            --cov-branch --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml -q --durations=10
      - name: Runtime and walk-forward tests
        run: |
          pytest tests/runtime/ tests/integration/test_trading_runtime_orchestrator.py \
            tests/integration/test_upstox_gateway_integration.py \
            tests/integration/test_upstox_order_lifecycle.py \
            tests/integration/test_upstox_market_data.py \
            analytics/walk_forward/tests/ -q --tb=short
      - name: Replay determinism verifier
        run: python -m scripts.verify_event_replay
      - name: Auth integration regression (WS reconnect; live TOTP skips without creds)
        run: |
          pytest -m "auth_integration" -v --tb=short \
            tests/integration/test_auth_totp_live.py \
            tests/integration/test_websocket_reconnect_failure.py
      - name: Coverage threshold
        run: |
          # Overall coverage must be >= 80%
          coverage report --fail-under=80
      - name: Coverage gate - brokers module
        run: |
          # Brokers module must have >= 85% coverage
          coverage report --include="brokers/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 85) exit 1}'
      - name: Coverage gate - oms core
        run: |
          # OMS core must have >= 90% (canonical application/oms + shim brokers/common/oms)
          coverage report --include="application/oms/*","brokers/common/oms/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 90) exit 1}'
      - name: Coverage gate - application layer
        run: |
          # Application layer must have >= 80% coverage
          coverage report --include="application/*" --show-missing | tail -1 | awk '{print $NF}' | sed 's/%//' | awk '{if ($1 < 80) exit 1}'
      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit.xml
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
            safety-report.json

  quant-parity:
    name: Quant Parity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run quant parity tests
        env:
          STRICT_EXECUTION_PARITY: "1"
        run: |
          pytest tests/quant/ -v --tb=short
      - name: Verify baseline quant parity
        run: |
          python scripts/baseline_quant_parity.py --mode verify
      - name: Replay determinism verifier
        run: python -m scripts.verify_event_replay

  integration:
    name: Integration Tests (Dhan sandbox only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        env:
          DHAN_INTEGRATION: "1"
        run: |
          pytest brokers/dhan/tests/integration/ -v --tb=short
      - name: Auth integration regression (TOTP + WebSocket reconnect)
        run: |
          pytest -m "auth_integration" -v --tb=short \
            tests/integration/test_auth_totp_live.py \
            tests/integration/test_websocket_reconnect_failure.py
          echo "::notice title=Auth Integration::Requires .env.local / .env.upstox on runner for live TOTP tests; WS reconnect runs offline."

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-and-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run E2E tests
        run: |
          pytest -m "e2e" -v --tb=short --durations=10 \
            tests/e2e/
      - name: Verify complete trading flow
        run: |
          pytest tests/e2e/test_complete_trading_flow.py -v --tb=short
      - name: Verify multi-broker failover
        run: |
          pytest tests/e2e/test_multi_broker_failover.py -v --tb=short
      - name: Verify order lifecycle
        run: |
          pytest tests/e2e/test_order_lifecycle.py -v --tb=short
      - name: Verify replay & backtest parity
        run: |
          pytest tests/e2e/test_replay_backtest_flow.py -v --tb=short

  stress-tests:
    name: Stress & Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-and-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run stress tests
        run: |
          pytest -m "stress" -v --tb=short --durations=10 \
            tests/stress/
      - name: Run OMS stress tests
        run: |
          pytest tests/stress/test_oms_stress.py -v --tb=short
      - name: Performance regression check
        run: |
          # Run critical path benchmarks and compare against baseline
          pytest tests/stress/ -v --tb=short \
            --benchmark-only \
            --benchmark-compare \
            --benchmark-min-rounds=5 \
            || echo "::warning title=Performance::Performance regression detected"

  flaky-test-detection:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run flaky test detection on E2E tests
        run: |
          python scripts/detect_flaky_tests.py tests/e2e/ --runs 3 --output flaky-e2e.json
        continue-on-error: true
      - name: Run flaky test detection on unit tests
        run: |
          python scripts/detect_flaky_tests.py tests/brokers/ --runs 3 --output flaky-unit.json
        continue-on-error: true
      - name: Upload flaky test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-reports
          path: |
            flaky-e2e.json
            flaky-unit.json

  upstox-revalidation:
    name: Upstox Live Revalidation (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: env.UPSTOX_INTEGRATION == '1' || vars.UPSTOX_INTEGRATION == '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Upstox read-only revalidation harness
        env:
          UPSTOX_INTEGRATION: "1"
        run: python scripts/revalidate_upstox_known_issues.py --output docs/audits/UPSTOX_REVALIDATION_EVIDENCE.md
        continue-on-error: true
      - name: Upload revalidation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstox-revalidation-evidence
          path: docs/audits/UPSTOX_REVALIDATION_EVIDENCE.md
