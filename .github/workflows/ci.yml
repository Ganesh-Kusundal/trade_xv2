name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy
        run: mypy brokers/ || true  # warnings only at Phase 0
        continue-on-error: true
      - name: Bandit security scan
        run: |
          bandit -r brokers/ cli/ datalake/ analytics/ -ll -f txt -o bandit-report.txt || true
          # Upload report as artifact for review
      - name: Safety check
        run: |
          safety check --json --output safety-report.json || true
          # Upload report as artifact for review

  unit-and-contract:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit + contract tests with coverage
        run: |
          pytest -m "not integration and not sandbox and not live_readonly" \
            --cov=brokers --cov=cli --cov=datalake --cov=tests/chaos \
            --cov-branch --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml -q
      - name: Coverage threshold
        run: |
          coverage report --fail-under=60
      - name: Replay determinism verifier
        # Phase 1 cert: scripts/verify_event_replay.py is the canonical
        # event-replay determinism check. Run it on every PR to catch
        # regressions in OMS replay semantics.
        run: |
          python -m scripts.verify_event_replay || \
            echo "::warning::Replay verifier failed (non-blocking; investigate if persistent)"
      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: junit.xml
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.txt
            safety-report.json

  integration:
    name: Integration Tests (Dhan sandbox only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        env:
          DHAN_INTEGRATION: "1"
        run: |
          pytest -m "integration and sandbox" -v
        continue-on-error: true  # Phase 0: no secrets in CI
