name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      
      - name: Run mutation tests
        id: mutation
        run: |
          bash scripts/run_mutation_tests.sh || echo "MUTATION_FAILED=true" >> $GITHUB_ENV
        continue-on-error: true
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: |
            /tmp/mutmut_results_*.txt
            htmlcov/
      
      - name: Check mutation score
        if: env.MUTATION_FAILED == 'true'
        run: |
          echo "::error::Mutation testing failed. Review artifacts for details."
          exit 1
