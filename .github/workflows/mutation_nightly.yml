name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" mutmut
      - name: Run mutation tests on domain and OMS
        run: |
          mutmut run --paths-to-mutate domain/,brokers/common/oms/ --runner "python -m pytest -x -q" || true
          mutmut results
