# Broker live/paper smoke — former `broker verify/certify` CLI removed (brokers purity).
# Paper path: unit/integration broker tests. Live: operator-run session probes.

name: Broker Live Certification (nightly)

on:
  schedule:
    - cron: "30 18 * * 1-5"  # 00:00 IST Tue–Sat ≈ after US Monday–Friday
  workflow_dispatch:
    inputs:
      broker:
        description: "Broker id (dhan|upstox|paper) — reserved for future live probes"
        required: true
        default: "paper"

jobs:
  paper-smoke:
    name: Paper broker unit smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Paper broker unit suite
        run: |
          PYTHONPATH="${{ github.workspace }}/src" pytest \
            tests/unit/brokers/paper \
            tests/unit/domain/test_nse_market_hours.py \
            -q --tb=short
