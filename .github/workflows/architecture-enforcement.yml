name: Architecture Enforcement

on:
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'

jobs:
  ruff-lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.22
      - name: Ruff lint (syntax only)
        run: ruff check src --select E9
      - name: Ruff format check
        run: ruff format --check src

  exception-hierarchy:
    name: Exception Hierarchy Compliance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -r requirements.txt
      - name: Check exception hierarchy
        run: python scripts/architecture/check_exception_hierarchy.py

  import-rules:
    name: Import Architecture Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify no direct broker imports from application layer
        run: |
          violations=$(grep -r "from brokers\.\(dhan\|upstox\|paper\)" --include="*.py" src/application/ src/interface/ src/infrastructure/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "❌ Application layer importing broker-specific modules:"
            echo "$violations"
            exit 1
          fi
          echo "✅ No application-to-broker direct imports"
      - name: Verify production packages do not import tradex.runtime facade
        run: |
          # Mirror tests/architecture/test_no_tradex_runtime_in_production.py (grep gate for CI speed).
          # Excludes tests/ trees and the facade package itself.
          set +e
          violations=$(grep -RInE 'from tradex\.runtime(\.| import)|import tradex\.runtime' \
            --include='*.py' \
            src/application src/infrastructure src/brokers src/interface src/config src/datalake src/analytics src/runtime src/domain \
            2>/dev/null \
            | grep -v '/tests/' \
            | grep -v 'test_' \
            || true)
          set -e
          if [ -n "$violations" ]; then
            echo "❌ Production code imports deprecated tradex.runtime facade:"
            echo "$violations"
            echo "Import from domain/application/infrastructure/runtime instead."
            exit 1
          fi
          echo "✅ No production tradex.runtime facade imports"

  no-print-statements:
    name: No Print Statements in Production Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for print() in non-script files
        run: |
          violations=$(grep -rn "print(" --include="*.py" src/application/ src/brokers/ src/infrastructure/ src/config/ src/domain/ src/interface/ 2>/dev/null | grep -v "__repr__\|__str__\|# noqa\|\.print(" || true)
          if [ -n "$violations" ]; then
            echo "❌ Found print() statements in production code:"
            echo "$violations"
            exit 1
          fi
          echo "✅ No print() statements in production code"

  architecture-fitness:
    name: Architecture Fitness Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -r requirements.txt
      - name: Run architecture fitness tests
        run: python -m pytest tests/architecture/ -v --tb=short

  import-smoke:
    name: Import Smoke Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -r requirements.txt
      - name: Run import smoke tests
        run: python -m pytest tests/architecture/test_imports.py -v --tb=short
