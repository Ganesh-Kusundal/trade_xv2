name: Production Gate

on:
  push:
    branches:
      - 'release/**'
      - 'v*.*.*'
  pull_request:
    branches:
      - 'release/**'
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1: Unit & Contract Tests ──────────────────────────────────
  unit-tests:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit + contract tests
        run: |
          PYTHONPATH=src pytest -m "not integration and not sandbox and not live_readonly" \
            --cov=brokers --cov=interface --cov=datalake --cov=analytics \
            --cov=application --cov=domain --cov=infrastructure --cov=runtime \
            --cov-branch --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml -v

      - name: Coverage threshold (90%)
        run: |
          coverage report --fail-under=80

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: junit.xml

  # ── Phase 2: Chaos Tests ────────────────────────────────────────────
  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run chaos suite (marked)
        run: |
          PYTHONPATH=src pytest tests/chaos/ -m chaos -v --tb=short

  # ── Phase 3: Memory Leak Tests ──────────────────────────────────────
  memory-tests:
    name: Memory Leak Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run memory leak tests
        run: |
          PYTHONPATH=src pytest tests/architecture/regression_invariants/test_memory_leaks.py -v --tb=short

  # ── Phase 4: Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Bandit security scan (HIGH severity = FAIL)
        run: |
          bandit -r src/ -ll -f json -o bandit-results.json || true
          # Check for HIGH severity issues
          HIGH_COUNT=$(python3 -c "
          import json
          data = json.load(open('bandit-results.json'))
          high = [i for i in data.get('results', []) if i.get('issue_severity') == 'HIGH']
          print(len(high))
          ")
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT HIGH severity vulnerabilities"
            exit 1
          fi
          echo "✅ Zero HIGH severity vulnerabilities"

      - name: Safety dependency check
        run: |
          safety check --json --output safety-results.json || true
          UNSAFE=$(python3 -c "
          import json
          data = json.load(open('safety-results.json'))
          print(len(data))
          " 2>/dev/null || echo "0")
          if [ "$UNSAFE" -gt 0 ]; then
            echo "::warning::Found $UNSAFE vulnerable dependencies"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-results.json
            safety-results.json

  # ── Phase 5: Code Quality ───────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check . --output-format=github

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: MyPy (domain + OMS core — ERROR gate)
        # DR-T3: same ERROR-mode gate as ci.yml — fails on any type error in the
        # clean domain/OMS submodules (verified 0 errors). Brokers remain advisory
        # below (full repo flip deferred to P7).
        run: |
          set -e
          MYPY_CLEAN=(
            src/domain/aggregates src/domain/analytics src/domain/backtest
            src/domain/capability_manifest src/domain/constants src/domain/market
            src/domain/models src/domain/primitives src/domain/providers src/domain/quotes
            src/domain/repositories src/domain/risk src/domain/scanners src/domain/sessions
            src/domain/value_objects
            src/application/oms/reconciliation
            src/application/oms/__init__.py src/application/oms/composition.py
            src/application/oms/daily_pnl_reset_scheduler.py src/application/oms/errors.py
            src/application/oms/factory.py src/application/oms/idempotency_guard.py
            src/application/oms/ledger_shadow.py
            src/application/oms/order_audit_logger.py src/application/oms/order_position_updater.py
            src/application/oms/order_repository_adapter.py src/application/oms/order_state_validator.py
            src/application/oms/order_validator.py
            src/application/oms/process_context.py src/application/oms/protocols.py
            src/application/oms/recon_heal_policy.py src/application/oms/risk_manager.py
            src/application/oms/square_off_service.py
          )
          PYTHONPATH=src mypy "${MYPY_CLEAN[@]}"
          echo "::notice title=MyPy::domain + OMS core type checks passed (0 errors)"

      - name: MyPy (brokers — advisory until P7)
        # Brokers still carry ~499 errors (full flip deferred to P7). Tracked as a
        # warning only; surfaced, not silent.
        run: |
          set +e
          mypy src/brokers/ 2>&1 | tee /tmp/mypy-output.txt
          EXIT_CODE=$?
          set -e
          ERROR_COUNT=$(grep -oP 'Found \K\d+(?= errors)' /tmp/mypy-output.txt || echo "0")
          echo "MyPy (brokers) errors: $ERROR_COUNT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning title=MyPy::brokers: Found $ERROR_COUNT type errors (tracked, non-blocking)"
          else
            echo "✅ brokers: All type checks passed!"
          fi

  # ── Phase 6: Replay Determinism ─────────────────────────────────────
  replay-determinism:
    name: Replay Determinism Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run replay determinism verifier
        run: |
          PYTHONPATH=src pytest tests/integration/test_event_replay_determinism.py -q --tb=short

      - name: Pre-prod live auth regression (PRE_PROD_GATE=1)
        if: env.PRE_PROD_GATE == '1'
        env:
          PRE_PROD_GATE: "1"
        run: |
          pytest -m "auth_integration" tests/integration/test_auth_totp_live.py -v --tb=short
          PYTHONPATH=src pytest tests/integration/brokers/upstox/test_ws_parity.py -v --tb=short

  # ── Phase 7: Production Certification Gate ──────────────────────────
  certification-gate:
    name: Production Certification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - unit-tests
      - chaos-tests
      - memory-tests
      - security-scan
      - code-quality
      - replay-determinism
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: API readiness + ledger outbox gates
        run: |
          PYTHONPATH=src pytest \
            tests/unit/application/services/test_api_readiness.py \
            tests/architecture/test_shadow_parity_gate.py \
            tests/integration/api/test_health.py \
            -q --tb=short

      - name: Run production certification
        id: certification
        run: |
          python scripts/audit/production_certification.py --verbose --json > certification-report.json || true
          cat certification-report.json

      - name: Check certification result
        run: |
          OVERALL=$(python3 -c "
          import json
          data = json.load(open('certification-report.json'))
          print(data.get('overall', 'UNKNOWN'))
          ")
          if [ "$OVERALL" != "PASS" ]; then
            echo "::error::Production certification FAILED — overall status: $OVERALL"
            exit 1
          fi
          echo "✅ Production certification PASSED"

      - name: Upload certification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: certification-report
          path: certification-report.json

  # ── Summary ─────────────────────────────────────────────────────────
  summary:
    name: Production Gate Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - chaos-tests
      - memory-tests
      - security-scan
      - code-quality
      - replay-determinism
      - certification-gate
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "## Production Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          RESULTS="${{ toJson(needs) }}"
          echo "$RESULTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for job, info in data.items():
              result = info.get('result', 'unknown')
              icon = '✅' if result == 'success' else ('⚠️' if result == 'skipped' else '❌')
              print(f'| {job} | {icon} {result} |')
          " >> $GITHUB_STEP_SUMMARY
