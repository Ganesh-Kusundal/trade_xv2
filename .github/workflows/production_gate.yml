name: Production Gate

on:
  push:
    branches:
      - 'release/**'
      - 'v*.*.*'
  pull_request:
    branches:
      - 'release/**'
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1: Unit & Contract Tests ──────────────────────────────────
  unit-tests:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit + contract tests
        run: |
          pytest -m "not integration and not sandbox and not live_readonly" \
            --cov=brokers --cov=cli --cov=datalake --cov=analytics \
            --cov-branch --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml -v

      - name: Coverage threshold (90%)
        run: |
          coverage report --fail-under=90

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: junit.xml

  # ── Phase 2: Chaos Tests ────────────────────────────────────────────
  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run network partition chaos tests
        run: |
          pytest tests/chaos/test_network_partitions.py -v --tb=short

      - name: Run data corruption chaos tests
        run: |
          pytest tests/chaos/test_data_corruption.py -v --tb=short

      - name: Run existing chaos tests
        run: |
          pytest tests/chaos/test_failover.py tests/chaos/test_failure_modes.py tests/chaos/test_recovery_certification.py -v --tb=short

  # ── Phase 3: Memory Leak Tests ──────────────────────────────────────
  memory-tests:
    name: Memory Leak Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run memory leak tests
        run: |
          pytest tests/regression/test_memory_leaks.py -v --tb=short

  # ── Phase 4: Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Bandit security scan (HIGH severity = FAIL)
        run: |
          bandit -r brokers/ cli/ datalake/ analytics/ -ll -f json -o bandit-results.json || true
          # Check for HIGH severity issues
          HIGH_COUNT=$(python3 -c "
          import json
          data = json.load(open('bandit-results.json'))
          high = [i for i in data.get('results', []) if i.get('issue_severity') == 'HIGH']
          print(len(high))
          ")
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $HIGH_COUNT HIGH severity vulnerabilities"
            exit 1
          fi
          echo "✅ Zero HIGH severity vulnerabilities"

      - name: Safety dependency check
        run: |
          safety check --json --output safety-results.json || true
          UNSAFE=$(python3 -c "
          import json
          data = json.load(open('safety-results.json'))
          print(len(data))
          " 2>/dev/null || echo "0")
          if [ "$UNSAFE" -gt 0 ]; then
            echo "::warning::Found $UNSAFE vulnerable dependencies"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-results.json
            safety-results.json

  # ── Phase 5: Code Quality ───────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check . --output-format=github

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: MyPy type check
        run: |
          set +e
          mypy brokers/ 2>&1 | tee /tmp/mypy-output.txt
          EXIT_CODE=$?
          set -e
          ERROR_COUNT=$(grep -oP 'Found \K\d+(?= errors)' /tmp/mypy-output.txt || echo "0")
          echo "MyPy errors: $ERROR_COUNT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning title=MyPy::Found $ERROR_COUNT type errors (tracked, non-blocking)"
          else
            echo "✅ All type checks passed!"
          fi

  # ── Phase 6: Replay Determinism ─────────────────────────────────────
  replay-determinism:
    name: Replay Determinism Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run replay determinism verifier
        run: |
          python -m scripts.verify_event_replay

  # ── Phase 7: Production Certification Gate ──────────────────────────
  certification-gate:
    name: Production Certification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - unit-tests
      - chaos-tests
      - memory-tests
      - security-scan
      - code-quality
      - replay-determinism
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run production certification
        id: certification
        run: |
          python scripts/production_certification.py --verbose --json > certification-report.json || true
          cat certification-report.json

      - name: Check certification result
        run: |
          OVERALL=$(python3 -c "
          import json
          data = json.load(open('certification-report.json'))
          print(data.get('overall', 'UNKNOWN'))
          ")
          if [ "$OVERALL" != "PASS" ]; then
            echo "::error::Production certification FAILED — overall status: $OVERALL"
            exit 1
          fi
          echo "✅ Production certification PASSED"

      - name: Upload certification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: certification-report
          path: certification-report.json

  # ── Summary ─────────────────────────────────────────────────────────
  summary:
    name: Production Gate Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - chaos-tests
      - memory-tests
      - security-scan
      - code-quality
      - replay-determinism
      - certification-gate
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "## Production Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          RESULTS="${{ toJson(needs) }}"
          echo "$RESULTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for job, info in data.items():
              result = info.get('result', 'unknown')
              icon = '✅' if result == 'success' else ('⚠️' if result == 'skipped' else '❌')
              print(f'| {job} | {icon} {result} |')
          " >> $GITHUB_STEP_SUMMARY
