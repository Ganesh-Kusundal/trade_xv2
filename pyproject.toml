[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tradexv2"
version = "0.1.0"
description = "Python-based, broker-agnostic algorithmic trading framework for Indian exchanges"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31",
    "pandas>=2.0",
    "pydantic>=2.5",
    "rich>=13.0",
    "textual>=0.40",
    "python-dotenv>=1.0",
    "PyYAML>=6.0",
    "dhanhq>=2.0",
    "pyotp>=2.9",
    "PyJWT>=2.8",
    "aiohttp>=3.9",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "pytest-xdist>=3.5",
    "ruff>=0.1",
    "mypy>=1.7",
    "pre-commit>=3.5",
    "bandit>=1.7",
    "pip-audit>=2.6",
    "import-linter>=2.0",
    "hypothesis>=6.100",
]

[project.entry-points."tradex.brokers"]
# Phase 2 will populate these; leave empty for Phase 0
# dhan = "brokers.dhan:DhanBroker"
# upstox = "brokers.upstox:UpstoxBroker"
# paper = "brokers.paper:PaperBroker"

[tool.setuptools.packages.find]
include = ["brokers*", "cli*", "analytics*", "datalake*", "config*", "domain*", "runtime*", "application*", "infrastructure*", "market_data*", "oms*", "event_bus*", "portfolio*", "risk*", "strategy*", "backtesting*", "replay*"]

# ─── pytest ────────────────────────────────────────────────
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests", "brokers", "analytics", "cli", "datalake", "application", "domain", "infrastructure"]
markers = [
    "unit: module-owned unit tests",
    "contract: broker/module contract tests",
    "dhan: DhanHQ integration tests",
    "integration: tests that call external broker APIs",
    "sandbox: sandbox tests that may place and cancel orders",
    "live_readonly: live tests that must only read from real endpoints",
    "performance: latency and throughput benchmarks",
    "upstox: Upstox-specific unit tests",
    "upstox_integration: Upstox integration tests (gated by UPSTOX_INTEGRATION=1)",
    "upstox_sandbox: sandbox tests that may place and cancel orders",
    "upstox_live_readonly: live tests that must only read from real endpoints",
    "upstox_sdk_compat: SDK compatibility tests",
    "stress: long-running concurrency stress tests",
    "pre_prod: tests required on pre-prod gate (run only when PRE_PROD_GATE=1)",
    "auth_integration: live TOTP bootstrap and WebSocket reconnect regression (auto-skips without creds)",
    "cli_endpoint: offline subprocess smoke for a registered CLI endpoint",
    "cli_endpoint_live: live_readonly subprocess smoke — requires .env.local Dhan creds",
    "cli_endpoint_sandbox: sandbox order placement — requires DHAN_INTEGRATION=1",
    "paper_replay_parity: Paper trading ↔ Replay engine parity",
    "cross_broker_parity: Cross-broker data source parity",
    "live_backtest_parity: Live ↔ Backtest execution parity",
    "scanner_determinism: Scanner output determinism",
    "feature_parity: Feature computation parity across runs",
    "oms_integration: OMS and broker gateway integration tests",
    "memory: Memory profiling and leak detection tests",
    "e2e: End-to-end trading flow tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-ra --strict-markers --tb=short --durations=10"

# Parity enforcement - register custom pytest plugin
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# ─── coverage ─────────────────────────────────────────────
[tool.coverage.run]
source = ["brokers", "analytics", "cli", "datalake", "application", "domain", "infrastructure", "tests/chaos"]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/tests/run.py",
]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "\\.\\.\\.",
]
show_missing = true

# Mutation testing configuration (mutmut)
[tool.mutmut]
paths_to_mutate = "brokers,analytics,datalake,domain,application,infrastructure"
mutation_operators = [
    "uop",
    "aod",
    "aor",
    "cos",
]
test_runner = "pytest tests/ -x -q"
timeout = 300  # 5 minutes per mutation
fail_under = 90  # 90% mutant kill rate required

# ─── mypy ─────────────────────────────────────────────────
[tool.mypy]
python_version = "3.10"
strict = false
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
ignore_missing_imports = true
exclude = [
    "tests/",
    "scripts/",
    "build/",
    "dist/",
]

[[tool.mypy.overrides]]
module = ["dhanhq.*"]
ignore_missing_imports = true

# ─── ruff ─────────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".cache", "runtime", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "G",   # flake8-logging-format
    "N",   # pep8-naming
    "RUF", # ruff-specific
    "S",   # flake8-bandit (security)
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "B008",  # function-call-in-default-argument (common in FastAPI/Django)
    "S101",  # assert (we use asserts in tests)
    "S104",  # hardcoded-bind-all-interfaces (we control the env)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "B011"]
"scripts/**/*.py" = ["S", "E", "F"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false

# ─── Coding Standards ─────────────────────────────────────
# These rules enforce architectural invariants and team conventions.
# See docs/CODING_STANDARDS.md for the full guide.

[tool.ruff.lint.flake8-tidy-imports.banned-api]
# Domain types must come from brokers.common, not broker-specific packages
"brokers.dhan.domain.Quote" = {msg = "Import Quote from brokers.common.core.domain, not from brokers.dhan.domain"}
"brokers.dhan.domain.Balance" = {msg = "Import Balance from brokers.common.core.domain, not from brokers.dhan.domain"}
"brokers.dhan.domain.DepthLevel" = {msg = "Import DepthLevel from brokers.common.core.domain, not from brokers.dhan.domain"}
"brokers.dhan.domain.MarketDepth" = {msg = "Import MarketDepth from brokers.common.core.domain, not from brokers.dhan.domain"}
# Lower layers cannot import from CLI
"cli" = {msg = "Lower layers (datalake, analytics, brokers) cannot import from cli. Use entry points or events instead."}
# Cross-broker imports are forbidden
"brokers.dhan" = {msg = "Cannot import from brokers.dhan in brokers.common or other broker packages"}
"brokers.upstox" = {msg = "Cannot import from brokers.upstox in brokers.common or other broker packages"}

# ─── Import Linter Contracts ──────────────────────────────
# Enforce architectural layer boundaries (REF-012).
# Run: lint-imports --config pyproject.toml

[tool.importlinter]
root_packages = ["domain", "brokers", "analytics", "datalake", "cli", "api", "application", "infrastructure"]

[[tool.importlinter.contracts]]
name = "Domain independence"
type = "forbidden"
source_modules = ["domain"]
forbidden_modules = ["brokers", "analytics", "datalake", "cli", "application", "api"]

[[tool.importlinter.contracts]]
name = "Infrastructure independence"
type = "forbidden"
source_modules = ["infrastructure"]
forbidden_modules = ["brokers", "analytics", "cli", "application", "api"]

[[tool.importlinter.contracts]]
name = "Analytics broker-adapter isolation"
type = "forbidden"
source_modules = ["analytics"]
forbidden_modules = ["brokers.dhan", "brokers.upstox", "brokers.paper"]

[[tool.importlinter.contracts]]
name = "Broker common isolation"
type = "forbidden"
source_modules = ["brokers.common"]
forbidden_modules = ["brokers.dhan", "brokers.upstox", "analytics"]

[[tool.importlinter.contracts]]
name = "Application broker isolation"
type = "forbidden"
source_modules = ["application"]
forbidden_modules = ["brokers"]
ignore_imports = [
    "application.execution.tests.test_execution_service -> brokers.paper.paper_gateway",
    "application.trading.tests.test_trading_orchestrator_e2e -> brokers.paper.paper_gateway",
    "application.oms.tests.test_oms_e2e -> brokers.common.resilience.circuit_breaker",
    "application.oms.tests.test_oms_e2e -> brokers.dhan.exceptions",
    "application.oms.tests.test_oms_e2e -> brokers.dhan.http_client",
]
