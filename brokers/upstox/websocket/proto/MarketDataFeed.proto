// Upstox V3 MarketDataFeed.proto (copied from the official Upstox source).
// See https://assets.upstox.com/feed/market-data-feed/v3/MarketDataFeed.proto
//
// This file is informational — the actual Python stub is generated by
// `python -m grpc_tools.protoc` and stored at market_feed_pb2.py.
syntax = "proto3";
package com.upstox.marketdatafeed;

message LTPC {
  double ltp = 1;
  string ltt = 2;
  string ltq = 3;
  double cp = 4;
}

message OHLC {
  string interval = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  string vol = 6;
  string ts = 7;
}

message MarketOHLC {
  repeated OHLC ohlc = 1;
}

message OptionGreeks {
  double delta = 1;
  double theta = 2;
  double gamma = 3;
  double vega = 4;
  double rho = 5;
}

message FirstLevelWithGreeks {
  LTPC ltpc = 1;
  FirstDepth firstDepth = 2;
  OptionGreeks optionGreeks = 3;
  string vtt = 4;
  int64 oi = 5;
  double iv = 6;
}

message FirstDepth {
  string bidQ = 1;
  double bidP = 2;
  string askQ = 3;
  double askP = 4;
}

message BidAskQuote {
  string bidQ = 1;
  double bidP = 2;
  string askQ = 3;
  double askP = 4;
}

message MarketLevel {
  repeated BidAskQuote bidAskQuote = 1;
}

message IndexFeed {
  LTPC ltpc = 1;
  MarketOHLC marketOHLC = 2;
}

message MarketFF {
  LTPC ltpc = 1;
  MarketLevel marketLevel = 2;
  OptionGreeks optionGreeks = 3;
  MarketOHLC marketOHLC = 4;
  double atp = 5;
  string vtt = 6;
  int64 oi = 7;
  double iv = 8;
  int64 tbq = 9;
  int64 tsq = 10;
}

message FullFeed {
  MarketFF marketFF = 1;
}

message Quote {
  string instrument_key = 1;
  LTPC ltpc = 2;
  MarketLevel market_level = 3;
  MarketOHLC market_ohlc = 4;
  OptionGreeks option_greeks = 5;
  FirstLevelWithGreeks first_level_with_greeks = 6;
}

message Feed {
  LTPC ltpc = 1;
  FirstLevelWithGreeks first_level_with_greeks = 2;
  FullFeed fullFeed = 3;
  IndexFeed indexFeed = 4;
}
